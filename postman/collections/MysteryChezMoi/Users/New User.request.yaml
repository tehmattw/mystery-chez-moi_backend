$kind: http-request
name: New User
url: "{{URL}}users/signup"
method: POST
body:
  type: json
  content: |-
    {
        "name": "First Last",
        "email": "firstfirst.last@example.com",
        "password": "1234567890",
        "passwordConfirm": "1234567890",
        "passwordChangedAt": "2026-04-05"
    }
scripts:
